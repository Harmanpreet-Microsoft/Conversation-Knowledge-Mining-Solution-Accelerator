name: Deploy Infrastructure and Run E2E Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
  LOCATION: westus
  GPT_MIN_CAPACITY: 250
  TEXT_EMBEDDING_MIN_CAPACITY: 40

jobs:
  deploy:
    name: Deploy Infra and Apps
    runs-on: ubuntu-latest
    outputs:
      RESOURCE_GROUP_NAME: ${{ steps.check_create_rg.outputs.RESOURCE_GROUP_NAME }}
      WEBAPP_URL: ${{ steps.get_output.outputs.WEBAPP_URL }}
      API_APP_URL: ${{ steps.get_output.outputs.API_APP_URL }}
      DEPLOYMENT_SUCCESS: ${{ steps.deployment_status.outputs.SUCCESS }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Quota Check
        run: |
          chmod +x infra/scripts/checkquota_km.sh
          export GPT_MIN_CAPACITY="${{ env.GPT_MIN_CAPACITY }}"
          export TEXT_EMBEDDING_MIN_CAPACITY="${{ env.TEXT_EMBEDDING_MIN_CAPACITY }}"

          OUTPUT=$(infra/scripts/checkquota_km.sh 2>&1) || true
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "No region with sufficient quota found"; then
            echo "Quota check failed, skipping deployment"
            echo "QUOTA_FAILED=true" >> $GITHUB_ENV
            exit 1
          fi

      - name: Set Tag and Resource Group Name
        id: check_create_rg
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="test-${{ github.run_id }}-${{ github.run_attempt }}"
          else
            TAG="test-${{ github.run_number }}"
          fi

          RESOURCE_GROUP_NAME="rg-${TAG}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "RESOURCE_GROUP_NAME=$RESOURCE_GROUP_NAME" >> $GITHUB_ENV
          echo "RESOURCE_GROUP_NAME=$RESOURCE_GROUP_NAME" >> $GITHUB_OUTPUT

      - name: Deploy Infrastructure and Apps
        run: |
          az account set --subscription $AZURE_SUBSCRIPTION_ID
          az group create --name $RESOURCE_GROUP_NAME --location $LOCATION

          ./infra/deploy.sh $RESOURCE_GROUP_NAME

      - name: Extract Web App and API App URLs
        id: get_output
        run: |
          APPS=$(az webapp list --resource-group $RESOURCE_GROUP_NAME --query "[].name" -o tsv)
          for NAME in $APPS; do
            if [[ $NAME == web-* ]]; then
              echo "WEBAPP_URL=https://${NAME}.azurewebsites.net" >> $GITHUB_OUTPUT
            elif [[ $NAME == api-* ]]; then
              echo "API_APP_URL=https://${NAME}.azurewebsites.net" >> $GITHUB_OUTPUT
            fi
          done

      - name: Mark Deployment Success
        id: deployment_status
        run: |
          echo "SUCCESS=true" >> $GITHUB_OUTPUT

  e2e-test:
    name: Run E2E Tests
    needs: deploy
    if: ${{ needs.deploy.outputs.DEPLOYMENT_SUCCESS == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run End-to-End Tests
        env:
          WEBAPP_URL: ${{ needs.deploy.outputs.WEBAPP_URL }}
          API_APP_URL: ${{ needs.deploy.outputs.API_APP_URL }}
        run: |
          echo "Testing web app at $WEBAPP_URL"
          echo "Testing API app at $API_APP_URL"
          # Run actual test script
          ./tests/run-e2e-tests.sh $WEBAPP_URL $API_APP_URL

  cleanup-deployment:
    name: Clean Up Resources
    if: always()
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Set up Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Purge test resource group
        run: |
          RESOURCE_GROUP_NAME="${{ needs.deploy.outputs.RESOURCE_GROUP_NAME }}"
          if [ -n "$RESOURCE_GROUP_NAME" ]; then
            echo "Deleting resource group: $RESOURCE_GROUP_NAME"
            az group delete --name $RESOURCE_GROUP_NAME --yes --no-wait
          else
            echo "No resource group found to delete."
          fi
